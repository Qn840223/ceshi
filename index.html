<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="創新科技產品 - 解決您的核心痛點">
    <title>科技產品落地頁</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Hero 區域 -->
    <section class="hero-section" id="hero">
        <div class="container">
            <!-- Logo -->
            <div class="logo">
                <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
                    <circle cx="30" cy="30" r="28" stroke="url(#gradient)" stroke-width="4"/>
                    <path d="M20 30L27 37L40 24" stroke="url(#gradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="gradient" x1="0" y1="0" x2="60" y2="60">
                            <stop offset="0%" stop-color="#00ff88"/>
                            <stop offset="100%" stop-color="#00d4ff"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>

            <!-- 主標題 -->
            <h1 class="hero-title">
                <span class="gradient-text">重新定義</span>
                <br>您的工作方式
            </h1>

            <p class="hero-subtitle">
                用科技的力量，讓複雜變簡單
            </p>

            <!-- 痛點卡片 -->
            <div class="pain-points">
                <div class="pain-card glass-effect">
                    <div class="pain-icon">⚡</div>
                    <h3>效率低下</h3>
                    <p>傳統方式耗時費力</p>
                </div>
                <div class="pain-card glass-effect">
                    <div class="pain-icon">💸</div>
                    <h3>成本高昂</h3>
                    <p>人力物力投入巨大</p>
                </div>
                <div class="pain-card glass-effect">
                    <div class="pain-icon">🔧</div>
                    <h3>操作複雜</h3>
                    <p>學習曲線陡峭難上手</p>
                </div>
            </div>
        </div>

        <!-- 滾動提示 -->
        <div class="scroll-indicator">
            <div class="scroll-arrow"></div>
        </div>
    </section>

    <!-- 功能介紹區域 -->
    <section class="features-section" id="features">
        <div class="container">
            <h2 class="section-title gradient-text">為什麼選擇我們</h2>
            
            <!-- 3D 產品圖 -->
            <div class="product-showcase">
                <div class="product-3d glass-effect">
                    <div class="product-screen">
                        <div class="screen-content">
                            <div class="screen-line"></div>
                            <div class="screen-line"></div>
                            <div class="screen-line"></div>
                            <div class="screen-circle"></div>
                        </div>
                    </div>
                    <div class="product-glow"></div>
                </div>
            </div>

            <!-- 功能列表 -->
            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon">🚀</div>
                    <div class="feature-content">
                        <h3>極速體驗</h3>
                        <p>毫秒級響應，流暢如絲</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🛡️</div>
                    <div class="feature-content">
                        <h3>安全可靠</h3>
                        <p>企業級加密，數據無憂</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🎯</div>
                    <div class="feature-content">
                        <h3>精準智能</h3>
                        <p>AI 驅動，智能決策</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 核心功能區域 -->
    <section class="cta-section" id="cta">
        <div class="container">
            <h2 class="section-title gradient-text">立即開始體驗</h2>
            <p class="cta-subtitle">選擇最適合您的聯繫方式</p>

            <!-- 四個聯繫按鈕 -->
            <div class="cta-buttons">
                <button class="cta-btn ripple-btn primary-btn" data-button="whatsapp">
                    <span class="btn-icon">📱</span>
                    <span class="btn-text">
                        <strong>WhatsApp</strong>
                        <small>即時響應</small>
                    </span>
                </button>

                <button class="cta-btn ripple-btn secondary-btn" data-button="line">
                    <span class="btn-icon">💬</span>
                    <span class="btn-text">
                        <strong style="font-size: 12px; white-space: nowrap;">LINE 聯繫</strong>
                        <small>即時溝通</small>
                    </span>
                </button>

                <button class="cta-btn ripple-btn primary-btn" data-button="wechat">
                    <span class="btn-icon">💚</span>
                    <span class="btn-text">
                        <strong style="font-size: 12px; white-space: nowrap;">微信諮詢</strong>
                        <small>掃碼添加</small>
                    </span>
                </button>

                <button class="cta-btn ripple-btn tertiary-btn" data-button="demo">
                    <span class="btn-icon">🎬</span>
                    <span class="btn-text">
                        <strong>預約演示</strong>
                        <small>深度體驗</small>
                    </span>
                </button>
            </div>

            <!-- 信任標識 -->
            <div class="trust-badges">
                <div class="badge">✓ 10000+ 企業信賴</div>
                <div class="badge">✓ 99.9% 可用性</div>
                <div class="badge">✓ 7×24 技術支持</div>
            </div>
        </div>
    </section>

    <!-- 背景裝飾 -->
    <div class="bg-decoration">
        <div class="grid-overlay"></div>
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- 追蹤系統 -->
    <script src="tracking.js"></script>
    <script src="script.js"></script>
</body>
</html>
